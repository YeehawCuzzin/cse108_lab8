<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University of California, Merced</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  {% if session.get('user_id') %}
  <nav>
    <div class="brand">
      <a href="/">
        <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="UC Merced Logo" style="height: 45px;">
      </a>
    </div>
    <div class="nav-right">
      {% if session.get('user_id') %}
        <span class="welcome">Hello, <strong>{{ session.full_name }}</strong></span>
        <a href="{{ url_for('logout') }}" class="btn btn-primary btn-sm" style="background: #f0c040; color: #1a3a5c;">Sign Out</a>
      {% endif %}
    </div>
  </nav>
  {% else %}
  <nav>
    <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="UC Merced Logo">
  </nav>
  {% endif %}

  <div class="page">
    {% for cat, msg in get_flashed_messages(with_categories=True) %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
