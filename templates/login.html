<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCM - Sign In</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="logo">
      <h1><img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="UC Merced Logo" style="max-width: 350px;"></h1>
      <p>Student Enrollment System</p>
    </div>
    {% for cat, msg in get_flashed_messages(with_categories=True) %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="e.g. cnorris" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
      <button type="submit">Sign in</button>
    </form>
    <p class="hint">
      <strong>Students</strong> (cnorris, mnorris…) &nbsp;|&nbsp;
      <strong>Teacher</strong> ahepworth &nbsp;|&nbsp;
      <strong>admin</strong> all password: <em>pass</em>
    </p>
  </div>
</body>
<canvas id="bg-canvas"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#bg-canvas'), alpha: true });

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.setZ(30);

    // Create particles
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];

    // UC Merced Color Palette for particles: Gold, White, Light Blue
    const colorPalette = [
      new THREE.Color(0xf0c040), // Gold
      new THREE.Color(0xffffff), // White
      new THREE.Color(0x8eb1d1)  // Light Blue
    ];

    // Reduced particle count slightly for a cleaner look, spread out further
    for (let i = 0; i < 4000; i++) {
      vertices.push(THREE.MathUtils.randFloatSpread(120)); // x
      vertices.push(THREE.MathUtils.randFloatSpread(120)); // y
      vertices.push(THREE.MathUtils.randFloatSpread(120)); // z

      // Randomly assign one of the brand colors to each particle
      const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
      colors.push(color.r, color.g, color.b);
    }

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    // Enable vertex colors in the material
    const material = new THREE.PointsMaterial({ 
      size: 0.15, 
      vertexColors: true,
      transparent: true,
      opacity: 0.8
    });
    
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // Gentle, elegant animation
    function animate() {
      requestAnimationFrame(animate);
      points.rotation.y += 0.0006; // Slower, smoother panning
      points.rotation.x += 0.0003;
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</html>
